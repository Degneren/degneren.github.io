<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Intercom – lm6dce9a</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f9f9;
      color: #333;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.subtitle { color: #666; font-size: 0.9rem; margin-top: 0; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input[type="text"], input[type="email"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <h1>Intercom Test — lm6dce9a</h1>
  <p class="subtitle">Fill in your details and click the button to launch the Intercom Messenger.</p>

  <label for="input-name">Name</label>
  <input type="text" id="input-name" placeholder="e.g. Degn" value="Degn">

  <label for="input-email">Email</label>
  <input type="email" id="input-email" placeholder="e.g. christian@degn.io" value="christian@degn.io">

  <label for="input-plan-type">Plan Type</label>
  <select id="input-plan-type">
    <option value="Free">Free</option>
    <option value="Pro" selected>Pro</option>
  </select>

  <button onclick="launchIntercom()">Launch Intercom Messenger</button>

  <script>
    (function(){var w=window;var ic=w.Intercom;if(typeof ic==="function"){ic('reattach_activator');ic('update',{app_id:"lm6dce9a"});}else{var d=document;var i=function(){i.c(arguments);};i.q=[];i.c=function(args){i.q.push(args);};w.Intercom=i;var l=function(){var s=d.createElement('script');s.type='text/javascript';s.async=true;s.src='https://widget.intercom.io/widget/lm6dce9a';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};if(document.readyState==='complete'){l();}else if(w.attachEvent){w.attachEvent('onload',l);}else{w.addEventListener('load',l,false);}}})();

    function launchIntercom() {
      var name  = document.getElementById('input-name').value.trim();
      var email = document.getElementById('input-email').value.trim();
      var plan_type_test_new = document.getElementById('input-plan-type').value.trim();

      window.intercomSettings = {
        app_id: "lm6dce9a",
        name:  name  || undefined,
        email: email || undefined,
        plan_type_test_new: plan_type_test_new || undefined
      };

      window.Intercom('shutdown');
      window.Intercom('boot', window.intercomSettings);
      window.Intercom('show');
    }
  </script>

</body>
</html>
